<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Register to CampConnect</h2>
          <form (ngSubmit)="onSubmit(); $event.preventDefault()" #registerForm="ngForm" action="javascript:void(0)">
            <div class="mb-3">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="firstName" [(ngModel)]="firstName" name="firstName" required>
            </div>
            <div class="mb-3">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lastName" [(ngModel)]="lastName" name="lastName" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required>
            </div>
            <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
            <button type="button" class="btn btn-primary w-100" [disabled]="loading" (click)="onSubmit()">
              {{ loading ? 'Registering...' : 'Register' }}
            </button>
            <div class="text-center mt-3">
              <p>Already have an account? <a routerLink="/frontoffice/login">Login here</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
