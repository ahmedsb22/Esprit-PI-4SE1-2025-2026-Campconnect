<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Mot de passe oublié</h2>
          <p class="text-muted text-center mb-4">
            Saisissez votre adresse email pour recevoir un lien de réinitialisation.
          </p>

          <form (ngSubmit)="onSubmit()" #forgotForm="ngForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" required placeholder="votre@email.com">
            </div>

            <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
            <div *ngIf="message" class="alert alert-success">{{ message }}</div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
              {{ loading ? 'Envoi en cours...' : 'Envoyer le lien' }}
            </button>

            <div class="text-center mt-3">
              <a routerLink="/frontoffice/login">Retour à la connexion</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
