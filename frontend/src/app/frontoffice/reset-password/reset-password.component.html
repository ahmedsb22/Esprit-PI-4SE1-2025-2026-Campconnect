<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title text-center mb-4">Nouveau mot de passe</h2>

          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
          <div *ngIf="message" class="alert alert-success">{{ message }}</div>

          <form *ngIf="token && !message" (ngSubmit)="onSubmit()" #resetForm="ngForm">
            <div class="mb-3">
              <label for="password" class="form-label">Nouveau mot de passe</label>
              <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required>
            </div>

            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirmer le mot de passe</label>
              <input type="password" class="form-control" id="confirmPassword" [(ngModel)]="confirmPassword" name="confirmPassword" required>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
              {{ loading ? 'Mise à jour...' : 'Réinitialiser' }}
            </button>
          </form>

          <div class="text-center mt-3">
            <a routerLink="/frontoffice/login">Retour à la connexion</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
