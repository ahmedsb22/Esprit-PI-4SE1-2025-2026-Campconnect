name: CampConnect Backend CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean compile -DskipTests -q
      
    - name: Run Tests
      run: mvn test -B --fail-at-end || true
      
    - name: Package Application  
      run: mvn package -DskipTests -q
      
    - name: Build Docker Image
      run: docker build -f Dockerfile.backend -t campconnect-backend:latest .
