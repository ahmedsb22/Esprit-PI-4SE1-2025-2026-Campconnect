global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'campconnect-monitor'

# Configuration pour les alertes (optionnel)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Règles d'alerte (optionnel)
rule_files:
  # - "alert_rules.yml"

# Configuration des cibles à scraper
scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Spring Boot avec Actuator
  - job_name: 'campconnect-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['backend-service:8089']
        labels:
          application: 'campconnect-backend'
          environment: 'production'

  # MySQL Exporter (si vous installez mysqld_exporter)
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']
