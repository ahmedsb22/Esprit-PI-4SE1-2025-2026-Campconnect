apiVersion: apps/v1
kind: Deployment
metadata:
  name: campconnect-backend
  labels:
    app: campconnect-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: campconnect-backend
  template:
    metadata:
      labels:
        app: campconnect-backend
    spec:
      containers:
      - name: backend
        image: campconnect-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8089
          name: http
        env:
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/campconnect1?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: password
        - name: SERVER_PORT
          value: "8089"
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          value: "health,info,prometheus"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8089
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8089
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: campconnect-backend
spec:
  selector:
    app: campconnect-backend
  ports:
  - protocol: TCP
    port: 8089
    targetPort: 8089
    name: http
  type: ClusterIP

